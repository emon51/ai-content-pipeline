services:
  backend:
    build: ./backend
    container_name: pipeline_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - AWS_S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - minio
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./frontend
    container_name: pipeline_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    container_name: pipeline_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio_init:
    image: minio/mc:latest
    container_name: pipeline_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/rebrand-content &&
      echo 'Bucket ready.'
      "

volumes:
  minio_data: